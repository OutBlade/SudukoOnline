name: Build & Deploy APK

on:
  push:
    branches: [ main ]
    paths:
      - 'app/src/**'
      - 'app/build.gradle.kts'
      - 'build.gradle.kts'
      - 'gradle/**'
      - 'gradle.properties'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$GITHUB_WORKSPACE/release.jks"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName\s*=' app/build.gradle.kts | grep -oP '(?<=")[^"]+')
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout download page repo
        uses: actions/checkout@v4
        with:
          repository: OutBlade/sudoku-online-download
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: download-page

      - name: Update APK and version string
        run: |
          cp app/build/outputs/apk/release/app-release.apk download-page/sudoku-online.apk
          VERSION="${{ steps.version.outputs.name }}"
          sed -i "s/Version [0-9][0-9.]*/Version $VERSION/" download-page/index.html
          cd download-page
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add sudoku-online.apk index.html
          git diff --staged --quiet || git commit -m "chore: release APK v$VERSION"
          git push
