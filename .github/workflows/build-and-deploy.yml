name: Build & Deploy APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'app/src/**'
      - 'app/build.gradle.kts'
      - 'build.gradle.kts'
      - 'gradle/**'
      - 'gradle.properties'
      - 'firebase/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore
        run: printf '%s' "$KEYSTORE_B64" | base64 -d > "$GITHUB_WORKSPACE/release.jks"
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Verify keystore
        run: keytool -list -keystore "$GITHUB_WORKSPACE/release.jks" -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -noprompt

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName\s*=' app/build.gradle.kts | grep -oP '(?<=")[^"]+')
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: Deploy Firebase database rules
        continue-on-error: true
        run: |
          npm install -g firebase-tools
          firebase deploy --only database --config firebase/firebase.json --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive

      - name: Checkout download page repo
        uses: actions/checkout@v4
        with:
          repository: OutBlade/sudoku-online-download
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: download-page

      - name: Update APK, version.json and version string
        run: |
          cp app/build/outputs/apk/release/app-release.apk download-page/sudoku-online.apk
          VERSION="${{ steps.version.outputs.name }}"
          VERSION_CODE=$(grep 'versionCode\s*=' app/build.gradle.kts | grep -oP '\d+' | head -1)
          printf '{"versionCode":%s,"versionName":"%s","apkUrl":"https://outblade.github.io/sudoku-online-download/sudoku-online.apk"}\n' \
            "$VERSION_CODE" "$VERSION" > download-page/version.json
          sed -i "s/Version [0-9][0-9.]*/Version $VERSION/" download-page/index.html
          cd download-page
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add sudoku-online.apk version.json index.html
          git diff --staged --quiet || git commit -m "chore: release APK v$VERSION"
          git push
